info:
  name: 创建分类
  type: http
  seq: 2

http:
  method: POST
  url: "{{localhost}}/api/v1/categories"
  headers:
    - name: Authorization
      value: "{{token}}"
  body:
    type: json
    data: |-
      {
          "name": "工作",
          "color_code": "#FF5733",
          "sort_order": 1
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
