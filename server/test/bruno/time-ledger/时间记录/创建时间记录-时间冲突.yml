info:
  name: 创建时间记录-时间冲突
  type: http
  seq: 2

http:
  method: POST
  url: "{{localhost}}/api/v1/records"
  headers:
    - name: Authorization
      value: "{{token}}"
  body:
    type: json
    data: |-
      {
        "category_uuid": "{{category_uuid}}",
        "start_time": "2026-04-14T09:00:00Z",
        "end_time": "2026-04-14T11:30:00Z",
        "note": "与已有记录时间重叠",
        "source": "manual"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
