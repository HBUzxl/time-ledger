info:
  name: 更新记录-时间冲突
  type: http
  seq: 3

http:
  method: PUT
  url: "{{localhost}}/api/v1/records/{{record_uuid}}"
  headers:
    - name: Authorization
      value: "{{token}}"
  body:
    type: json
    data: |-
      {
        "category_uuid": "{{category_uuid}}",
        "start_time": "2026-04-14T09:30:00Z",
        "end_time": "2026-04-14T11:30:00Z",
        "note": "更新后与另一条记录冲突"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5