info:
  name: 获取记录列表
  type: http
  seq: 1

http:
  method: GET
  url: "{{localhost}}/api/v1/records?start_date=2026-04-01&end_date=2026-04-30&page=1&page_size=10"
  headers:
    - name: Authorization
      value: Bearer {{token}}
  params:
    - name: start_date
      value: 2026-04-01
      type: query
    - name: end_date
      value: 2026-04-30
      type: query
    - name: page
      value: "1"
      type: query
    - name: page_size
      value: "10"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
